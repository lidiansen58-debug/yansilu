name: desktop-bundles

on:
  workflow_dispatch:
    inputs:
      updater_artifacts:
        description: "Generate signed Tauri updater artifacts. Requires TAURI_SIGNING_PRIVATE_KEY."
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle_env: nsis
            artifact_name: yansilu-windows-bundles
          - os: ubuntu-24.04
            bundle_env: deb,appimage
            artifact_name: yansilu-linux-bundles
          - os: macos-latest
            bundle_env: app,dmg
            artifact_name: yansilu-macos-bundles

    runs-on: ${{ matrix.os }}

    env:
      YANSILU_DESKTOP_BUNDLES: ${{ matrix.bundle_env }}
      YANSILU_DESKTOP_UPDATER_ARTIFACTS: ${{ github.event_name == 'push' && 'true' || inputs.updater_artifacts }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Desktop preflight
        run: npm run build:desktop:check

      - name: Build desktop bundles
        run: npm run build:desktop

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
            !apps/desktop/src-tauri/target/release/bundle/**/*.dSYM/**
          if-no-files-found: error
