name: desktop-ci

on:
  workflow_dispatch:
    inputs:
      updater_artifacts:
        description: "Generate signed Tauri updater artifacts. Requires TAURI_SIGNING_PRIVATE_KEY."
        type: boolean
        default: false
  pull_request:
    branches:
      - main

jobs:
  detect-desktop-surface:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      full_bundle_required: ${{ steps.filter.outputs.full_bundle_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect desktop bundle-impacting changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            full_bundle_required:
              - '.github/workflows/desktop-bundles.yml'
              - '.github/workflows/desktop-release.yml'
              - 'apps/desktop/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/build-desktop.mjs'
              - 'scripts/desktop-*.mjs'

  preflight:
    needs:
      - detect-desktop-surface
    if: github.event_name == 'pull_request' && needs.detect-desktop-surface.outputs.full_bundle_required == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Desktop dev preflight
        run: npm run dev:desktop:check

      - name: Desktop bundle preflight
        run: npm run build:desktop:check

  build:
    needs:
      - detect-desktop-surface
      - preflight
    if: always() && (github.event_name == 'workflow_dispatch' || needs.detect-desktop-surface.outputs.full_bundle_required == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle_env: nsis
            artifact_name: yansilu-windows-bundles
          - os: ubuntu-24.04
            bundle_env: deb,appimage
            artifact_name: yansilu-linux-bundles
          - os: macos-latest
            bundle_env: app,dmg
            artifact_name: yansilu-macos-bundles

    runs-on: ${{ matrix.os }}

    env:
      YANSILU_DESKTOP_BUNDLES: ${{ matrix.bundle_env }}
      YANSILU_DESKTOP_UPDATER_ARTIFACTS: ${{ github.event_name == 'workflow_dispatch' && inputs.updater_artifacts && 'true' || 'false' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Desktop preflight
        run: npm run build:desktop:check

      - name: Build desktop bundles
        run: npm run build:desktop

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
            !apps/desktop/src-tauri/target/release/bundle/**/*.dSYM/**
          if-no-files-found: error
