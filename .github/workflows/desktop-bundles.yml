name: desktop-ci

on:
  workflow_dispatch:
    inputs:
      updater_artifacts:
        description: "Generate signed Tauri updater artifacts. Requires TAURI_SIGNING_PRIVATE_KEY."
        type: boolean
        default: false
  pull_request:
    branches:
      - main

jobs:
  detect-desktop-surface:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    outputs:
      full_bundle_required: ${{ steps.filter.outputs.full_bundle_required }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect desktop bundle-impacting changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            full_bundle_required:
              - '.github/workflows/desktop-bundles.yml'
              - '.github/workflows/desktop-release.yml'
              - 'apps/desktop/**'
              - 'packages/app-update/**'
              - 'package.json'
              - 'package-lock.json'
              - 'scripts/build-desktop.mjs'
              - 'scripts/collect-release-assets.mjs'
              - 'scripts/desktop-*.mjs'
              - 'scripts/generate-update-manifest.mjs'

  preflight:
    if: github.event_name == 'pull_request'
    needs: detect-desktop-surface
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Install Linux system dependencies
        if: needs.detect-desktop-surface.outputs.full_bundle_required == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Desktop bundle preflight
        if: needs.detect-desktop-surface.outputs.full_bundle_required == 'true'
        run: npm run build:desktop:check

      - name: Ordinary PR desktop gate
        if: needs.detect-desktop-surface.outputs.full_bundle_required != 'true'
        run: echo "No desktop bundle-impacting changes detected; release-grade desktop checks are deferred."

  build:
    needs:
      - detect-desktop-surface
      - preflight
    if: always() && (github.event_name == 'workflow_dispatch' || needs.detect-desktop-surface.outputs.full_bundle_required == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle_env: nsis
            artifact_name: yansilu-windows-bundles
          - os: ubuntu-24.04
            bundle_env: deb,appimage
            artifact_name: yansilu-linux-bundles
          - os: macos-latest
            bundle_env: app,dmg
            artifact_name: yansilu-macos-arm64-bundles
          - os: macos-15-intel
            bundle_env: app,dmg
            artifact_name: yansilu-macos-intel-bundles

    runs-on: ${{ matrix.os }}

    env:
      YANSILU_DESKTOP_BUNDLES: ${{ matrix.bundle_env }}
      YANSILU_DESKTOP_UPDATER_ARTIFACTS: ${{ github.event_name == 'workflow_dispatch' && inputs.updater_artifacts && 'true' || 'false' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Require Tauri updater signing secrets
        if: github.event_name == 'workflow_dispatch' && inputs.updater_artifacts
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for signed updater artifacts."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required for signed updater artifacts."
            exit 1
          fi

      - name: Desktop preflight
        run: npm run build:desktop:check

      - name: Build desktop bundles
        run: npm run build:desktop

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
            !apps/desktop/src-tauri/target/release/bundle/**/*.dSYM/**
          if-no-files-found: error

  release-rehearsal:
    needs: build
    if: always() && github.event_name == 'workflow_dispatch' && inputs.updater_artifacts && needs.build.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Download desktop bundle artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare rehearsal release assets and update feeds
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ github.run_number }}-rehearsal"
          node ./scripts/collect-release-assets.mjs --dist dist --out release-assets
          npm run release:update-manifest -- \
            --bundle-manifest release-assets/bundle-manifest.json \
            --out release-assets/update-manifest.json \
            --tauri-out release-assets/latest.json \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$tag" \
            --changelog "Signed desktop release rehearsal for ${GITHUB_SHA}."
          test -f release-assets/update-manifest.json
          test -f release-assets/latest.json

      - name: Upload rehearsal release assets
        uses: actions/upload-artifact@v7
        with:
          name: yansilu-release-rehearsal-assets
          path: release-assets/**
          if-no-files-found: error
