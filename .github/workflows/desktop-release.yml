name: desktop-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Validate release tag
        run: node ./scripts/release-validate-tag.mjs "${GITHUB_REF_NAME}"

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle_env: nsis
            artifact_name: yansilu-windows-nsis
          - os: ubuntu-24.04
            bundle_env: deb,appimage
            artifact_name: yansilu-linux-bundles
          - os: macos-latest
            bundle_env: app,dmg
            artifact_name: yansilu-macos-universal-bundles
            macos_arch: arm64
            desktop_target: universal-apple-darwin

    runs-on: ${{ matrix.os }}

    env:
      YANSILU_DESKTOP_BUNDLES: ${{ matrix.bundle_env }}
      YANSILU_DESKTOP_TARGET: ${{ matrix.desktop_target }}
      YANSILU_DESKTOP_UPDATER_ARTIFACTS: "true"
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Install macOS universal Rust targets
        if: matrix.desktop_target == 'universal-apple-darwin'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Verify macOS runner architecture
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          actual="$(uname -m)"
          expected="${{ matrix.macos_arch }}"
          test "$actual" = "$expected"
          echo "Building macOS $actual bundle"

      - name: Import Apple Developer ID certificate
        if: matrix.desktop_target == 'universal-apple-darwin'
        shell: bash
        run: |
          set -euo pipefail
          for secret_name in APPLE_ID APPLE_APP_PASSWORD APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!secret_name:-}" ]; then
              echo "::error::$secret_name is required for signed and notarized macOS releases."
              exit 1
            fi
          done
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/apple-developer-id.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import "$RUNNER_TEMP/apple-developer-id.p12" -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain
          security default-keychain -s build.keychain
          security find-identity -v -p codesigning build.keychain | grep -q "Developer ID Application"

      - name: Require Tauri updater signing secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is required for signed updater artifacts."
            exit 1
          fi
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY_PASSWORD is required for signed updater artifacts."
            exit 1
          fi

      - name: Desktop preflight
        run: npm run build:desktop:check

      - name: Build desktop bundles
        if: runner.os != 'macOS'
        run: npm run build:desktop

      - name: Build signed and notarized Universal macOS bundle
        if: matrix.desktop_target == 'universal-apple-darwin'
        run: bash ./scripts/build-mac-release.sh

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/**/release/bundle/**
            !apps/desktop/src-tauri/target/**/release/bundle/**/*.dSYM/**
          if-no-files-found: error

      - name: Remove temporary signing keychain
        if: always() && matrix.desktop_target == 'universal-apple-darwin'
        shell: bash
        run: security delete-keychain build.keychain || true

  draft-release:
    needs: build
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Download desktop bundle artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare release assets and update feeds
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          node ./scripts/collect-release-assets.mjs --dist dist --out release-assets
          npm run release:update-manifest -- \
            --bundle-manifest release-assets/bundle-manifest.json \
            --out release-assets/update-manifest.json \
            --tauri-out release-assets/latest.json \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$tag" \
            --changelog "$tag desktop release."
          test -f release-assets/update-manifest.json
          test -f release-assets/latest.json

      - name: Create or update draft GitHub release
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          mapfile -d '' files < <(find release-assets -maxdepth 1 -type f -print0 | sort -z)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets were prepared."
            exit 1
          fi

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$tag" "${files[@]}" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --generate-notes \
              --verify-tag \
              --title "$tag"
          fi
