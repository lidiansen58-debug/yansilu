name: release-readiness

on:
  workflow_dispatch:
    inputs:
      run_full_browser_e2e:
        description: "Run the full browser E2E suite in addition to mvp:check."
        type: boolean
        default: false
      updater_artifacts:
        description: "Generate signed Tauri updater artifacts. Requires TAURI_SIGNING_PRIVATE_KEY."
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright Chromium
        if: inputs.run_full_browser_e2e
        run: npx playwright install --with-deps chromium

      - name: Release readiness MVP check
        run: npm run mvp:check

      - name: Full browser E2E
        if: inputs.run_full_browser_e2e
        run: npm run test:e2e:browser
        env:
          RUN_BROWSER_E2E: "1"

  build:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bundle_env: nsis
            artifact_name: release-readiness-windows-nsis
          - os: ubuntu-24.04
            bundle_env: deb,appimage
            artifact_name: release-readiness-linux-bundles
          - os: macos-latest
            bundle_env: app,dmg
            artifact_name: release-readiness-macos-arm64-bundles
          - os: macos-15-intel
            bundle_env: app,dmg
            artifact_name: release-readiness-macos-intel-bundles

    runs-on: ${{ matrix.os }}

    env:
      YANSILU_DESKTOP_BUNDLES: ${{ matrix.bundle_env }}
      YANSILU_DESKTOP_UPDATER_ARTIFACTS: ${{ inputs.updater_artifacts && 'true' || 'false' }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf

      - name: Install npm dependencies
        run: npm ci

      - name: Desktop preflight
        run: npm run build:desktop:check

      - name: Build desktop bundles
        run: npm run build:desktop

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
            !apps/desktop/src-tauri/target/release/bundle/**/*.dSYM/**
          if-no-files-found: error
