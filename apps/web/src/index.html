<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研思录</title>
    <meta http-equiv="refresh" content="0;url=./prototype.html" />
    <script>
      // Tauri expects an index.html at the dist root. Our MVP lives in prototype.html.
      // Preserve query/hash while redirecting.
      (function () {
        try {
          var target = "./prototype.html" + window.location.search + window.location.hash;
          window.location.replace(target);
        } catch (_) {}
      })();
    </script>
  </head>
  <body></body>
</html>
